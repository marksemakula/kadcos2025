[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CMS page should serve its own index.html (must come before the catch-all)
[[redirects]]
  from = "/cms/*"
  to = "/cms/index.html"
  status = 200

# Backward compatibility if this site is ever deployed on Netlify again:
# the frontend now calls /api/* (Vercel convention), map it to Netlify functions.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - redirect all non-existent routes to index.html for React Router
# NOTE: must NOT use force=true, otherwise real files that exist on the site
# (videos, /data/*.json, images) are also rewritten to index.html and never load.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200